server.port=8080
spring.application.name=api-gateway

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=productServiceCB,fallbackUri=forward:/fallback/product

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=orderServiceCB,fallbackUri=forward:/fallback/order

spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=cartServiceCB,fallbackUri=forward:/fallback/cart

# Circuit breaker instances
resilience4j.circuitbreaker.instances.productServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.productServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productServiceCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.productServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.orderServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.orderServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderServiceCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.orderServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.orderServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.orderServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.cartServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.cartServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cartServiceCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cartServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.cartServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cartServiceCB.automatic-transition-from-open-to-half-open-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
