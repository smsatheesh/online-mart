<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 980"
     style="font-family: ui-sans-serif, system-ui, sans-serif; background:#fff;">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── SERVICE HEADERS ── -->
  <rect x="20"  y="12" width="90"  height="44" rx="8" fill="#E1D9F8" stroke="#7F77DD" stroke-width="1"/>
  <text x="65"  y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Client</text>

  <rect x="128" y="12" width="120" height="44" rx="8" fill="#E1D9F8" stroke="#7F77DD" stroke-width="1"/>
  <text x="188" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">order-service</text>
  <text x="188" y="48" text-anchor="middle" font-size="11" fill="#534AB7">+ Outbox</text>

  <rect x="268" y="12" width="110" height="44" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="323" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Kafka</text>
  <text x="323" y="48" text-anchor="middle" font-size="11" fill="#854F0B">topics</text>

  <rect x="398" y="12" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="463" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">product-service</text>
  <text x="463" y="48" text-anchor="middle" font-size="11" fill="#0F6E56">inventory</text>

  <rect x="548" y="12" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="603" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">cart-service</text>

  <!-- Lifelines -->
  <line x1="65"  y1="56" x2="65"  y2="968" stroke="#ccc" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="188" y1="56" x2="188" y2="968" stroke="#ccc" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="323" y1="56" x2="323" y2="968" stroke="#ccc" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="463" y1="56" x2="463" y2="968" stroke="#ccc" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="603" y1="56" x2="603" y2="968" stroke="#ccc" stroke-width="0.8" stroke-dasharray="5 4"/>

  <!-- ════ HAPPY PATH ════ -->
  <rect x="12" y="68" width="876" height="18" rx="4" fill="#EAF3DE"/>
  <text x="450" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#3B6D11">✓  Happy Path — order created → inventory reserved → cart cleared</text>

  <!-- 1 POST /orders -->
  <text x="14" y="108" font-size="11" fill="#888">1</text>
  <line x1="65" y1="106" x2="182" y2="106" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="124" y="100" text-anchor="middle" font-size="11" fill="#333">POST /orders</text>

  <!-- save + outbox -->
  <rect x="158" y="114" width="60" height="22" rx="4" fill="#EAF3DE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="188" y="125" text-anchor="middle" font-size="10" fill="#085041">save + outbox</text>

  <!-- 2 order.created -->
  <text x="14" y="154" font-size="11" fill="#888">2</text>
  <line x1="188" y1="152" x2="317" y2="152" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="252" y="146" text-anchor="middle" font-size="11" fill="#854F0B">order.created</text>

  <!-- 3 product-service consumes -->
  <text x="14" y="178" font-size="11" fill="#888">3</text>
  <line x1="323" y1="176" x2="457" y2="176" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="390" y="170" text-anchor="middle" font-size="11" fill="#0F6E56">consume order.created</text>
  <rect x="433" y="184" width="60" height="22" rx="4" fill="#EAF3DE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="463" y="195" text-anchor="middle" font-size="10" fill="#085041">reserve stock</text>

  <!-- 4 inventory.reserved -->
  <text x="14" y="222" font-size="11" fill="#888">4</text>
  <line x1="463" y1="220" x2="329" y2="220" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="396" y="214" text-anchor="middle" font-size="11" fill="#854F0B">inventory.reserved</text>

  <!-- 5a → order CONFIRMED -->
  <text x="14" y="248" font-size="11" fill="#888">5</text>
  <line x1="323" y1="246" x2="194" y2="246" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="258" y="240" text-anchor="middle" font-size="11" fill="#0F6E56">→ CONFIRMED</text>

  <!-- 5b → cart cleared -->
  <line x1="323" y1="262" x2="592" y2="262" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="456" y="256" text-anchor="middle" font-size="11" fill="#185FA5">→ clear cart</text>
  <rect x="573" y="270" width="60" height="22" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="603" y="281" text-anchor="middle" font-size="10" fill="#0C447C">cart cleared</text>

  <!-- 6 201 to client -->
  <text x="14" y="308" font-size="11" fill="#888">6</text>
  <line x1="182" y1="306" x2="71" y2="306" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="124" y="300" text-anchor="middle" font-size="11" fill="#333">201 Created</text>

  <!-- ════ FAILURE PATH A ════ -->
  <rect x="12" y="326" width="876" height="18" rx="4" fill="#FCEBEB"/>
  <text x="450" y="338" text-anchor="middle" font-size="12" font-weight="600" fill="#A32D2D">✗  Failure Path A — insufficient stock → saga compensation → order CANCELLED</text>

  <text x="14" y="368" font-size="11" fill="#888">1</text>
  <line x1="65" y1="366" x2="182" y2="366" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="124" y="360" text-anchor="middle" font-size="11" fill="#333">POST /orders</text>
  <rect x="158" y="374" width="60" height="22" rx="4" fill="#EAF3DE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="188" y="385" text-anchor="middle" font-size="10" fill="#085041">save + outbox</text>

  <text x="14" y="414" font-size="11" fill="#888">2</text>
  <line x1="188" y1="412" x2="317" y2="412" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="252" y="406" text-anchor="middle" font-size="11" fill="#854F0B">order.created</text>

  <text x="14" y="438" font-size="11" fill="#888">3</text>
  <line x1="323" y1="436" x2="457" y2="436" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="390" y="430" text-anchor="middle" font-size="11" fill="#0F6E56">consume order.created</text>
  <rect x="433" y="444" width="60" height="22" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="463" y="455" text-anchor="middle" font-size="10" fill="#A32D2D">insufficient</text>

  <text x="14" y="482" font-size="11" fill="#888">4</text>
  <line x1="463" y1="480" x2="329" y2="480" stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="396" y="474" text-anchor="middle" font-size="11" fill="#A32D2D">inventory.reservation_failed</text>

  <text x="14" y="508" font-size="11" fill="#888">5</text>
  <line x1="323" y1="506" x2="194" y2="506" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="258" y="500" text-anchor="middle" font-size="11" fill="#A32D2D">→ CANCELLED</text>
  <rect x="158" y="512" width="60" height="22" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="188" y="523" text-anchor="middle" font-size="10" fill="#A32D2D">order cancelled</text>

  <text x="14" y="548" font-size="11" fill="#888">6</text>
  <line x1="182" y1="546" x2="71" y2="546" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="124" y="540" text-anchor="middle" font-size="11" fill="#A32D2D">event: cancelled</text>

  <!-- ════ FAILURE PATH B — OUTBOX RETRY ════ -->
  <rect x="12" y="566" width="876" height="18" rx="4" fill="#FAEEDA"/>
  <text x="450" y="578" text-anchor="middle" font-size="12" font-weight="600" fill="#854F0B">⚠  Failure Path B — Kafka broker unavailable → outbox retry until PUBLISHED / FAILED</text>

  <rect x="128" y="594" width="120" height="84" rx="8" fill="#fffbf0" stroke="#EF9F27" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="188" y="616" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">@Scheduled</text>
  <text x="188" y="634" text-anchor="middle" font-size="11" fill="#854F0B">poll PENDING rows</text>
  <text x="188" y="650" text-anchor="middle" font-size="11" fill="#0F6E56">retry → PUBLISHED</text>
  <text x="188" y="666" text-anchor="middle" font-size="11" fill="#A32D2D">max attempts → FAILED</text>

  <path d="M248 628 Q285 628 285 658 Q285 686 248 686" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="298" y="652" font-size="10" fill="#854F0B">broker</text>
  <text x="298" y="666" font-size="10" fill="#854F0B">down/retry</text>

  <line x1="248" y1="614" x2="317" y2="614" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="282" y="608" text-anchor="middle" font-size="11" fill="#854F0B">publish</text>

  <!-- ════ OUTBOX ATOMICITY DETAIL ════ -->
  <rect x="12" y="706" width="876" height="18" rx="4" fill="#F1EFE8"/>
  <text x="450" y="718" text-anchor="middle" font-size="12" font-weight="600" fill="#5F5E5A">Outbox Pattern — atomicity guarantee (no dual-write problem)</text>

  <rect x="128" y="730" width="120" height="80" rx="8" fill="#fff" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="188" y="752" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">DB transaction</text>
  <text x="188" y="770" text-anchor="middle" font-size="11" fill="#444">INSERT order</text>
  <text x="188" y="786" text-anchor="middle" font-size="11" fill="#444">INSERT outbox</text>
  <text x="188" y="800" text-anchor="middle" font-size="10" fill="#888">(status=PENDING)</text>

  <rect x="128" y="820" width="120" height="60" rx="8" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="188" y="842" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Outbox poller</text>
  <text x="188" y="858" text-anchor="middle" font-size="11" fill="#555">reads PENDING rows</text>
  <text x="188" y="872" text-anchor="middle" font-size="11" fill="#555">marks PUBLISHED</text>

  <line x1="248" y1="852" x2="317" y2="852" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="282" y="846" text-anchor="middle" font-size="11" fill="#854F0B">produce</text>

  <line x1="323" y1="866" x2="457" y2="866" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="323" y1="882" x2="597" y2="882" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="390" y="860" text-anchor="middle" font-size="11" fill="#0F6E56">→ product-service</text>
  <text x="456" y="876" text-anchor="middle" font-size="11" fill="#185FA5">→ cart-service</text>

  <rect x="398" y="892" width="196" height="36" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="496" y="908" text-anchor="middle" font-size="11" fill="#555">Partial index on status = 'PENDING'</text>
  <text x="496" y="922" text-anchor="middle" font-size="10" fill="#888">ensures fast @Scheduled polling</text>

  <!-- LEGEND -->
  <rect x="12" y="942" width="876" height="26" rx="4" fill="#F1EFE8"/>
  <line x1="28"  y1="955" x2="62"  y2="955" stroke="#854F0B" stroke-width="2"/>
  <text x="66"   y="959" font-size="11" fill="#854F0B">Kafka publish</text>
  <line x1="170" y1="955" x2="204" y2="955" stroke="#0F6E56" stroke-width="2"/>
  <text x="208"  y="959" font-size="11" fill="#0F6E56">consume (happy)</text>
  <line x1="330" y1="955" x2="364" y2="955" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="368"  y="959" font-size="11" fill="#A32D2D">compensation / failure</text>
  <line x1="530" y1="955" x2="564" y2="955" stroke="#444" stroke-width="2"/>
  <text x="568"  y="959" font-size="11" fill="#333">HTTP</text>
  <line x1="618" y1="955" x2="652" y2="955" stroke="#aaa" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="656"  y="959" font-size="11" fill="#888">internal / retry</text>
</svg>
