server.port=8081
spring.application.name=product-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/online_mart}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Satheesh@5008}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.topic.order.created=local.sales.ecommerce.order.created.v1
spring.kafka.topic.order.cancelled=local.sales.ecommerce.order.cancelled.v1
spring.kafka.topic.inventory.reserved=local.sales.ecommerce.inventory.reserved.v1
spring.kafka.topic.inventory.failed=local.sales.ecommerce.inventory.failed.v1

# Kafka Consumer
spring.kafka.consumer.group-id=product-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.onlinemart.product.event.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka broker circuit breaker
resilience4j.circuitbreaker.instances.kafkaBroker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaBroker.sliding-window-size=5
resilience4j.circuitbreaker.instances.kafkaBroker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.kafkaBroker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.kafkaBroker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaBroker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.kafkaBroker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.inventoryProcessor.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryProcessor.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryProcessor.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.inventoryProcessor.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.inventoryProcessor.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.inventoryProcessor.automatic-transition-from-open-to-half-open-enabled=true

management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]