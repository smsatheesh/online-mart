server.port=8082
spring.application.name=order-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/online_mart}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Satheesh@5008}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.openfeign.lazy-attributes-resolution=true

# Feign target URLs
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}
cart.service.url=${CART_SERVICE_URL:http://localhost:8083}

# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.topic.order.created=local.sales.ecommerce.order.created.v1
spring.kafka.topic.order.cancelled=local.sales.ecommerce.order.cancelled.v1
spring.kafka.topic.inventory.reserved=local.sales.ecommerce.inventory.reserved.v1
spring.kafka.topic.inventory.failed=local.sales.ecommerce.inventory.failed.v1

# Kafka Consumer
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Feign + Resilience4j bridge
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit breaker config for cart-service Feign call
resilience4j.circuitbreaker.instances.CartServiceClient.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.CartServiceClient.sliding-window-size=10
resilience4j.circuitbreaker.instances.CartServiceClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.CartServiceClient.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.CartServiceClient.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.CartServiceClient.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.CartServiceClient.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.CartServiceClient.record-exceptions=java.lang.Exception

# Expose circuit breaker state in actuator
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Kafka broker circuit breaker
resilience4j.circuitbreaker.instances.kafkaBroker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaBroker.sliding-window-size=5
resilience4j.circuitbreaker.instances.kafkaBroker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.kafkaBroker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.kafkaBroker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaBroker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.kafkaBroker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.orderStatusUpdater.sliding-window-size=10
resilience4j.circuitbreaker.instances.orderStatusUpdater.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderStatusUpdater.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.orderStatusUpdater.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.orderStatusUpdater.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.orderStatusUpdater.automatic-transition-from-open-to-half-open-enabled=true

management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]