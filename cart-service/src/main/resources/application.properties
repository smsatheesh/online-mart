server.port=8083
spring.application.name=cart-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/online_mart}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Satheesh@5008}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Feign target URL
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}

# Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# Kafka Consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.topic.order.created=local.sales.ecommerce.order.created.v1
spring.kafka.topic.inventory.reserved=local.sales.ecommerce.inventory.reserved.v1
spring.kafka.topic.customer.created=local.sales.ecommerce.customer.created.v1

spring.kafka.consumer.group-id=cart-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.onlinemart.cart.event.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.properties.spring.json.add.type.headers=false

resilience4j.circuitbreaker.instances.cartClearer.sliding-window-size=10
resilience4j.circuitbreaker.instances.cartClearer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cartClearer.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cartClearer.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.cartClearer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cartClearer.automatic-transition-from-open-to-half-open-enabled=true

management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]